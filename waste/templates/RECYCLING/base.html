{% extends "base.html" %}

{% block nav_home_url %}/recycling_home{% endblock %}

{% block nav_links %}
<li><a href="/recycling_home" id="nav-dashboard"><i class="fa-solid fa-house"></i> Home</a></li>
<li><a href="/recycling_view_records" id="nav-records"><i class="fa-solid fa-clipboard-list"></i> Records</a></li>
<li><a href="/recycling_complaints" id="nav-complaints"><i class="fa-solid fa-circle-exclamation"></i> Complaints</a></li>
<li><a href="/recycling_notifications" id="nav-notif"><i class="fa-solid fa-bell"></i> Notifications</a></li>
<li><a href="/signout" class="nav-logout" id="nav-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var path = window.location.pathname;
    var links = document.querySelectorAll('.nav-links a');
    links.forEach(function(link) {
      if (link.getAttribute('href') === path) {
        link.classList.add('active');
      }
    });
  });
</script>
{% endblock %}
