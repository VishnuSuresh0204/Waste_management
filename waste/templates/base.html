<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}EcoWaste Management{% endblock %}</title>
  <meta name="description" content="Smart Waste Management System – cleaner cities, greener future."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary:   #16a34a;
      --primary-d: #15803d;
      --primary-l: #4ade80;
      --accent:    #84cc16;
      --dark:      #0a0f0d;
      --dark2:     #111a14;
      --dark3:     #1a2e1e;
      --card:      rgba(255,255,255,0.06);
      --card-b:    rgba(255,255,255,0.12);
      --text:      #e2f4ea;
      --text-m:    #9ec9a8;
      --text-s:    #6aaa80;
      --border:    rgba(74,222,128,0.18);
      --shadow:    0 8px 32px rgba(0,0,0,0.45);
      --radius:    16px;
      --nav-h:     70px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--nav-h);
      background: rgba(10,15,13,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem;
      gap: 1rem;
    }
    .nav-brand {
      display: flex; align-items: center; gap: .6rem;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      color: var(--primary-l);
      letter-spacing: -.5px;
      white-space: nowrap;
    }
    .nav-brand i { color: var(--accent); font-size: 1.5rem; }
    .nav-links {
      display: flex; align-items: center; gap: .25rem;
      margin-left: auto; list-style: none;
    }
    .nav-links a {
      display: flex; align-items: center; gap: .4rem;
      padding: .5rem .9rem; border-radius: 10px;
      text-decoration: none; color: var(--text-m);
      font-size: .85rem; font-weight: 500;
      transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: rgba(74,222,128,.12);
      color: var(--primary-l);
    }
    .nav-links a i { font-size: .9rem; }
    .nav-logout {
      background: rgba(239,68,68,.12) !important;
      color: #f87171 !important;
      border: 1px solid rgba(239,68,68,.25) !important;
    }
    .nav-logout:hover { background: rgba(239,68,68,.25) !important; }
    .nav-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; margin-left: auto; }

    /* ===== PAGE WRAPPER ===== */
    .page-wrap {
      padding-top: calc(var(--nav-h) + 2rem);
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* ===== HERO BG ===== */
    .bg-hero {
      position: fixed; inset: 0; z-index: -1;
      background-size: cover; background-position: center;
      filter: brightness(.3) saturate(.8);
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: linear-gradient(135deg, rgba(10,15,13,.92) 0%, rgba(22,46,30,.85) 100%);
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }
    .card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem;
    }
    .card-header h2 { font-family: 'Outfit',sans-serif; font-size: 1.25rem; font-weight: 700; }
    .card-header i { color: var(--primary-l); font-size: 1.2rem; }
    .card-body { padding: 1.5rem; }

    /* ===== STATS GRID ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.25rem; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: .5rem;
      position: relative; overflow: hidden;
      transition: transform .25s, box-shadow .25s;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.5); }
    .stat-card .icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: .25rem;
    }
    .stat-card .val { font-family: 'Outfit',sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--primary-l); }
    .stat-card .lbl { font-size: .8rem; color: var(--text-s); font-weight: 500; text-transform: uppercase; letter-spacing: .8px; }
    .stat-card .glow {
      position: absolute; right: -20px; bottom: -20px;
      width: 100px; height: 100px; border-radius: 50%;
      opacity: .08; filter: blur(20px);
    }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(22,163,74,.15); }
    thead th { padding: .9rem 1rem; text-align: left; font-size: .78rem; text-transform: uppercase; letter-spacing: .8px; color: var(--primary-l); font-weight: 600; }
    tbody tr { border-top: 1px solid rgba(255,255,255,.05); transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.04); }
    tbody td { padding: .85rem 1rem; font-size: .88rem; color: var(--text-m); vertical-align: middle; }
    tbody td strong { color: var(--text); }

    /* ===== BADGES ===== */
    .badge {
      display: inline-block; padding: .25rem .65rem; border-radius: 999px;
      font-size: .72rem; font-weight: 600; text-transform: capitalize; letter-spacing: .4px;
    }
    .badge-green  { background: rgba(74,222,128,.15); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .badge-yellow { background: rgba(234,179,8,.15);  color: #facc15; border: 1px solid rgba(234,179,8,.3); }
    .badge-red    { background: rgba(239,68,68,.15);  color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-blue   { background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); }
    .badge-gray   { background: rgba(107,114,128,.15);color: #9ca3af; border: 1px solid rgba(107,114,128,.3); }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .6rem 1.2rem; border-radius: 10px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all .2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-d); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,163,74,.4); }
    .btn-outline { background: transparent; color: var(--primary-l); border: 1px solid var(--border); }
    .btn-outline:hover { background: rgba(74,222,128,.1); }
    .btn-danger { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .btn-danger:hover { background: rgba(239,68,68,.25); }
    .btn-sm { padding: .4rem .8rem; font-size: .78rem; border-radius: 8px; }

    /* ===== FORM ===== */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: .45rem; font-size: .82rem; font-weight: 500; color: var(--text-s); }
    .form-control {
      width: 100%; background: rgba(255,255,255,.06);
      border: 1px solid var(--border); border-radius: 10px;
      padding: .7rem 1rem; color: var(--text); font-size: .9rem;
      outline: none; transition: border .2s, box-shadow .2s;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(22,163,74,.18); }
    .form-control::placeholder { color: var(--text-s); opacity: .6; }
    select.form-control option { background: #1a2e1e; }
    textarea.form-control { resize: vertical; min-height: 90px; }

    /* ===== ALERTS (Django messages) ===== */
    .alerts-wrap { position: fixed; top: calc(var(--nav-h) + 12px); right: 1.2rem; z-index: 9999; display: flex; flex-direction: column; gap: .6rem; }
    .alert {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.2rem; border-radius: 12px;
      font-size: .85rem; font-weight: 500; min-width: 260px; max-width: 380px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideIn .3s ease;
    }
    .alert-success { background: rgba(22,163,74,.2); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .alert-error, .alert-danger { background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .alert-info { background: rgba(59,130,246,.2); border: 1px solid rgba(93,150,246,.3); color: #93c5fd; }
    .alert-warning { background: rgba(234,179,8,.2); border: 1px solid rgba(234,179,8,.3); color: #facc15; }
    .alert-close { margin-left: auto; cursor: pointer; opacity: .6; font-size: .85rem; }
    .alert-close:hover { opacity: 1; }
    @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

    /* ===== PAGE HEADER ===== */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-family:'Outfit',sans-serif; font-size:1.8rem; font-weight:800; }
    .page-header p { color: var(--text-s); margin-top:.3rem; font-size:.9rem; }
    .page-header .breadcrumb { display:flex; gap:.5rem; align-items:center; font-size:.8rem; color:var(--text-s); margin-bottom:.5rem; }
    .page-header .breadcrumb a { color: var(--text-s); text-decoration:none; }
    .page-header .breadcrumb a:hover { color: var(--primary-l); }
    .page-header .breadcrumb span { color: var(--primary-l); font-weight:600; }

    /* ===== MISC ===== */
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--text-s); }
    .empty-state i { font-size:3rem; margin-bottom:1rem; color:var(--primary); }
    .section-gap { margin-bottom: 2rem; }
    .text-right { text-align: right; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }

    @media(max-width:768px){
      .nav-links { display:none; flex-direction:column; position:absolute; top:var(--nav-h); left:0; right:0; background:rgba(10,15,13,.97); padding:1rem; border-bottom:1px solid var(--border); }
      .nav-links.open { display:flex; }
      .nav-toggle { display:block; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Background -->
<div class="bg-hero" style="{% block bg_image %}background-image:url('https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=1600&q=80'){% endblock %}"></div>
<div class="bg-overlay"></div>

<!-- Toasts -->
{% if messages %}
<div class="alerts-wrap" id="alertsWrap">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags }}">
    <i class="fa-solid {% if msg.tags == 'success' %}fa-circle-check{% elif msg.tags == 'error' or msg.tags == 'danger' %}fa-circle-exclamation{% else %}fa-circle-info{% endif %}"></i>
    {{ msg }}
    <span class="alert-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></span>
  </div>
  {% endfor %}
</div>
{% endif %}

<!-- Navbar -->
<nav class="navbar">
  <a href="{% block nav_home_url %}/{% endblock %}" class="nav-brand">
    <i class="fa-solid fa-leaf"></i> EcoWaste
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
  <ul class="nav-links" id="navLinks">
    {% block nav_links %}{% endblock %}
  </ul>
</nav>

<!-- Content -->
<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<script>
  // Auto-dismiss toasts
  setTimeout(()=>{ const w=document.getElementById('alertsWrap'); if(w) w.style.opacity='0'; }, 4000);
  setTimeout(()=>{ const w=document.getElementById('alertsWrap'); if(w) w.remove(); }, 4500);

  // Mobile nav
  document.getElementById('navToggle')?.addEventListener('click',()=>{
    document.getElementById('navLinks').classList.toggle('open');
  });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
